# Verification for everything that is NOT a push to main.
#
# Pushes to main are verified by container.yml instead, where the same reusable
# workflow gates publish/deploy. Splitting it this way keeps exactly one verify
# run per commit, while making main's run a genuine deploy gate rather than a
# status badge running alongside the deploy.
name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
