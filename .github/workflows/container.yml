name: Container

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # The deploy gate. Nothing is built or shipped until lint, typecheck, tests and
  # build all pass on this exact commit — previously these ran in a separate
  # workflow that the deploy neither waited for nor consulted.
  verify:
    uses: ./.github/workflows/verify.yml

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Deploy immutable image through SSM
        env:
          INSTANCE_ID: ${{ vars.AWS_INSTANCE_ID }}
          IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        run: |
          parameters="$(jq -nc --arg image "$IMAGE" '{commands:[
            "set -eu",
            "cd /opt/whatsapp-gateway",
            "git fetch origin main",
            "git merge --ff-only origin/main",
            "chmod +x scripts/deploy-aws.sh scripts/backup-production.sh",
            ("scripts/deploy-aws.sh " + $image)
          ]}')"
          command_id="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)"
          for attempt in $(seq 1 90); do
            status="$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)"
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 5
          done
          test "$status" = Success
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent}'
      - name: Verify public release
        env:
          EXPECTED_RELEASE: sha-${{ github.sha }}
        run: |
          for attempt in $(seq 1 30); do
            actual="$(curl --fail --silent --show-error https://wag.kortix.cloud/health | jq -r '.release' || true)"
            if [[ "$actual" == "$EXPECTED_RELEASE" ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "Expected $EXPECTED_RELEASE, got $actual" >&2
          exit 1
