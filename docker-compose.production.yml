name: whatsapp-gateway

x-gateway-environment: &gateway-environment
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
  BETTER_AUTH_URL: https://${DOMAIN}
  PUBLIC_BASE_URL: https://${DOMAIN}
  WEB_ORIGIN: https://${DOMAIN}
  TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  AUTH_ALLOWLIST_ENABLED: ${AUTH_ALLOWLIST_ENABLED:-true}
  ALLOWED_EMAILS: ${ALLOWED_EMAILS:-marko@kortix.ai}
  WORKER_CAPACITY: ${WORKER_CAPACITY:-25}
  RECONNECT_STABLE_SECONDS: ${RECONNECT_STABLE_SECONDS:-300}
  SYNC_FULL_HISTORY: ${SYNC_FULL_HISTORY:-false}
  WA_PROXY_URL: ${WA_PROXY_URL:-}
  WA_BROWSER: ${WA_BROWSER:-macos}
  WA_WEB_VERSION: ${WA_WEB_VERSION:-}
  WA_COUNTRY_CODE: ${WA_COUNTRY_CODE:-}
  PAIRING_TTL_SECONDS: ${PAIRING_TTL_SECONDS:-300}
  WEBHOOK_CONCURRENCY: ${WEBHOOK_CONCURRENCY:-10}
  WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-12}
  GATEWAY_RELEASE: ${GATEWAY_RELEASE:-unknown}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-whatsapp_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatsapp_gateway} -d ${POSTGRES_DB:-whatsapp_gateway}"]
      interval: 5s
      timeout: 3s
      retries: 30

  migrate:
    image: ${GATEWAY_IMAGE:-ghcr.io/kortix-ai/whatsapp-gateway:main}
    command: ["pnpm", "prisma", "migrate", "deploy"]
    environment: *gateway-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${GATEWAY_IMAGE:-ghcr.io/kortix-ai/whatsapp-gateway:main}
    environment:
      <<: *gateway-environment
      RUNTIME_ROLE: api
      PORT: 8080
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 20

  worker:
    image: ${GATEWAY_IMAGE:-ghcr.io/kortix-ai/whatsapp-gateway:main}
    environment:
      <<: *gateway-environment
      RUNTIME_ROLE: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  webhooks:
    image: ${GATEWAY_IMAGE:-ghcr.io/kortix-ai/whatsapp-gateway:main}
    environment:
      <<: *gateway-environment
      RUNTIME_ROLE: webhooks
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
